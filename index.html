<!DOCTYPE html>
<html>
<head>
  <title>Marilla SOS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body { font-family: Arial; text-align: center; }
    #map { height: 400px; width: 100%; }
  </style>
</head>

<body>

<h2>🚨 SOS Location</h2>
<div id="map"></div>
<p id="altitude"></p>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map = L.map('map').setView([0,0], 15);
let pathCoords = [];
let polyline = L.polyline(pathCoords, {color: 'red'}).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

let marker = L.marker([0,0]).addTo(map);
function updateLocation() {
    fetch("https://api.jsonbin.io/v3/b/69d9300636566621a89c7f87/latest")
    .then(res => res.json())
    .then(data => {

        let loc = data.record;

        if (!loc) return;

        // 🛑 STOP CONDITION
        if (loc.status === "STOP") {
            document.getElementById("altitude").innerText =
                "🛑 Tracking Stopped";
            return;
        }

        let pos = [loc.lat, loc.lng];

        marker.setLatLng(pos);
        map.panTo(pos);

        // trail
        if (pathCoords.length === 0 || 
            pathCoords[pathCoords.length - 1][0] !== pos[0] ||
            pathCoords[pathCoords.length - 1][1] !== pos[1]) {

            pathCoords.push(pos);
            polyline.setLatLngs(pathCoords);
        }

        let time = new Date(loc.time).toLocaleTimeString();

        document.getElementById("altitude").innerText =
            "Altitude: " + loc.alt + " m | Updated: " + time;
    })
    .catch(err => console.log(err));
}

// run immediately
updateLocation();

// update every 5 sec
setInterval(updateLocation, 10000);
</script>
</body>
</html>
